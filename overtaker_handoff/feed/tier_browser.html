function render(){
 const rows=Q?NODES.filter(n=>n._h.includes(Q)):NODES;
 const tot=rows.reduce((s,n)=>s+(n.usd_tier1||n.exposure),0);

  return;
 }
 const groups={};rows.forEach(n=>{const k=gkey(n);(groups[k]=groups[k]||[]).push(n);});

 }).join('');
}
